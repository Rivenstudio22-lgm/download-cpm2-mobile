<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPM2 | Download Oficial</title>
    <style>
        :root { --android: #3DDC84; --ios: #fff; --bg: #0a0a0a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; text-align: center; }
        
        /* BANNER COM A TUA IMAGEM */
        .hero {
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), var(--bg)), 
                        url('banner.png');image_760a5460
            background-size: cover;
            background-position: center;
            height: 65vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-bottom: 4px solid var(--android);
        }

        .title { font-size: 3.5em; font-weight: 900; text-transform: uppercase; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        
        .download-section { display: flex; gap: 20px; justify-content: center; padding: 40px; margin-top: -60px; }

        .card {
            background: #1a1a1a; border-radius: 15px; padding: 25px; width: 220px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333;
        }

        .btn {
            display: block; padding: 15px; border-radius: 10px; text-decoration: none; 
            font-weight: bold; margin-top: 15px; transition: 0.3s;
        }
        .btn-android { background: var(--android); color: #000; }
        .btn-ios { background: var(--ios); color: #000; }
        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        .comments-section { max-width: 600px; margin: 40px auto; text-align: left; padding: 20px; background: #111; border-radius: 10px; }
        .comment { border-bottom: 1px solid #222; padding: 10px 0; }
        .comment b { color: var(--android); }
    </style>
</head>
<body>

    <div class="hero">
        <h1 class="title">Car Parking Multiplayer 2</h1>
        <p>O melhor simulador de carros para o teu telemóvel</p>
    </div>

    <div class="download-section">
        <div class="card">
            <h3>Android</h3>
            <a href="seu-link-android.apk" class="btn btn-android">BAIXAR APK</a>
        </div>
        <div class="card">
            <h3>iPhone / iOS</h3>
            <a href="seu-link-ios" class="btn btn-ios">APP STORE</a>
        </div>
    </div>

    <!-- SECÇÃO DE COMENTÁRIOS -->
    <div class="comments-section">
        <h3>Comentários da Comunidade:</h3>
        <div class="comment">
            <b>@Player_Gamer:</b> "Gráficos incríveis! O melhor site para baixar sem anúncios."
        </div>
        <div class="comment">
            <b>@DriftKing:</b> "A versão 2 está muito melhor. Recomendo a todos!"
        </div>
    </div>

</body>
</html>
